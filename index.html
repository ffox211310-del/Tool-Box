<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=2.0">
  <title>ツールボックス - ホーム</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #1a1e2b 0%, #2a2f3f 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      padding: 1rem;
      margin: 0;
    }

    .home-container {
      width: 100%;
      max-width: 650px;
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 2.5rem;
      padding: 2rem 1.6rem 1.8rem;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    h1 {
      font-size: 2.4rem;
      font-weight: 500;
      color: #f0e6d0;
      text-align: center;
      margin-bottom: 0.3rem;
      letter-spacing: 0.02em;
      text-shadow: 0 4px 12px rgba(0,0,0,0.4);
    }

    .subtitle {
      text-align: center;
      color: #9aa4bf;
      margin-bottom: 2rem;
      font-size: 0.9rem;
      font-weight: 400;
      letter-spacing: 0.03em;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding-bottom: 1.2rem;
    }

    .tool-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
    }

    .tool-card {
      background: rgba(20, 22, 31, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 1.5rem;
      padding: 1.5rem 1.2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: 0 8px 16px -6px rgba(0,0,0,0.4);
      transition: all 0.25s ease;
      text-decoration: none;
      color: inherit;
      cursor: pointer;
    }

    .tool-card:hover {
      transform: translateY(-3px);
      background: rgba(30, 33, 46, 0.8);
      border-color: rgba(220, 200, 140, 0.25);
      box-shadow: 0 16px 20px -8px rgba(0,0,0,0.6);
    }

    .tool-info {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .tool-name {
      font-size: 1.4rem;
      font-weight: 500;
      color: #f3e5c9;
      letter-spacing: 0.02em;
    }

    .tool-desc {
      font-size: 0.8rem;
      color: #8e97b0;
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }

    .tool-icon {
      font-size: 2.4rem;
      filter: drop-shadow(0 6px 8px rgba(0,0,0,0.5));
      opacity: 0.9;
    }

    .footer-note {
      margin-top: 1.8rem;
      text-align: center;
      color: #5f6a82;
      font-size: 0.75rem;
    }

    @media (max-width: 480px) {
      .home-container {
        padding: 1.6rem 1.2rem 1.4rem;
      }
      h1 {
        font-size: 2rem;
      }
      .tool-card {
        padding: 1.2rem 1rem;
      }
      .tool-name {
        font-size: 1.2rem;
      }
      .tool-icon {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>
  <div class="home-container">
    <h1>📦 ツールボックス</h1>
    <div class="subtitle">必要なものを選んでください</div>
    
    <div class="tool-grid">
      <!-- 電卓カード -->
      <a href="calculator.html" class="tool-card">
        <div class="tool-info">
          <span class="tool-name">計算機</span>
          <span class="tool-desc">
            <span>🧮</span> シンプル電卓
          </span>
        </div>
        <div class="tool-icon">🔢</div>
      </a>
      
      <!-- メモカード -->
      <a href="memo.html" class="tool-card">
        <div class="tool-info">
          <span class="tool-name">メモ</span>
          <span class="tool-desc">
            <span>📝</span> すぐに書ける
          </span>
        </div>
        <div class="tool-icon">📋</div>
      </a>

      <!-- 時計カード -->
      <a href="time.html" class="tool-card">
        <div class="tool-info">
          <span class="tool-name">時計</span>
          <span class="tool-desc">
            <span>🕒</span> 現在時刻を表示
          </span>
        </div>
        <div class="tool-icon">⏰</div>
      </a>

      <!-- カレンダーカード -->
      <a href="calendar.html" class="tool-card">
        <div class="tool-info">
          <span class="tool-name">日付</span>
          <span class="tool-desc">
            <span>🗓️</span> 日程管理など
          </span>
        </div>
        <div class="tool-icon">📆</div>
      </a>

      <!-- レコーダー -->
      <a href="recorder.html" class="tool-card">
        <div class="tool-info">
          <span class="tool-name">録音</span>
          <span class="tool-desc">
            <span>🔴</span> ボイスメモ
          </span>
        </div>
        <div class="tool-icon">🎙️</div>
      </a>

      <!-- コンパス -->
      <a href="compass.html" class="tool-card">
        <div class="tool-info">
          <span class="tool-name">方位</span>
          <span class="tool-desc">
            <span>🌍️</span> 北極星より正確
          </span>
        </div>
        <div class="tool-icon">🧭</div>
      </a>
    </div>
    
    <div class="footer-note">
      今後ツールを追加予定  ·  タップで移動
    </div>
  </div>
</body>
</html>
