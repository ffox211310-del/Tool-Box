<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=2.0">
  <title>ボイスレコーダー - ツールボックス</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(160deg, #1e2230 0%, #262b3a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      padding: 1rem;
      margin: 0;
    }

    .recorder-container {
      width: 100%;
      max-width: 480px;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 2.2rem;
      padding: 1.8rem 1.6rem 1.8rem;
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.55), inset 0 1px 1px rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.07);
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      max-height: 90vh;
      overflow-y: auto;
    }

    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 500;
      color: #ecd9b4;
      letter-spacing: 0.02em;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      text-shadow: 0 3px 8px rgba(0,0,0,0.4);
    }

    .home-button {
      background: rgba(200, 180, 130, 0.12);
      border: 1px solid rgba(220, 200, 140, 0.35);
      color: #e8d5a3;
      font-size: 0.9rem;
      font-weight: 500;
      padding: 0.55rem 1.3rem;
      border-radius: 2.5rem;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: all 0.2s ease;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.35rem;
      letter-spacing: 0.03em;
      background-color: rgba(30, 32, 44, 0.7);
    }

    .home-button:hover {
      background: rgba(220, 190, 110, 0.2);
      border-color: rgba(240, 210, 120, 0.6);
      color: #f7e6c4;
      box-shadow: 0 0 12px rgba(200, 160, 70, 0.3);
    }

    .timer-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .timer-display {
      background: rgba(18, 20, 28, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 2rem;
      padding: 1.5rem 2.5rem;
      text-align: center;
      box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
      width: fit-content;
      margin: 0 auto;
    }

    .time-text {
      font-size: 3.5rem;
      font-weight: 300;
      color: #f3e5c9;
      letter-spacing: 0.06em;
      font-feature-settings: "tnum";
      text-shadow: 0 4px 15px rgba(0,0,0,0.6);
    }

    .record-btn {
      width: 5.5rem;
      height: 5.5rem;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.2);
      background: rgba(180, 50, 50, 0.25);
      backdrop-filter: blur(8px);
      color: #f08a7a;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      box-shadow: 0 8px 20px rgba(0,0,0,0.5);
      text-transform: uppercase;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .record-btn:active {
      transform: scale(0.94);
    }

    .record-btn.recording {
      background: rgba(200, 150, 40, 0.4);
      border-color: rgba(230, 180, 60, 0.7);
      color: #fae6a8;
      box-shadow: 0 0 25px rgba(210, 160, 40, 0.6);
      animation: pulse-gold 1.5s infinite;
    }

    @keyframes pulse-gold {
      0% { box-shadow: 0 0 15px rgba(210, 160, 40, 0.6); }
      50% { box-shadow: 0 0 30px rgba(230, 170, 50, 0.9); }
      100% { box-shadow: 0 0 15px rgba(210, 160, 40, 0.6); }
    }

    .recordings-list {
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
      max-height: 280px;
      overflow-y: auto;
      padding-right: 0.3rem;
    }

    .recording-card {
      background: rgba(18, 20, 28, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 1.2rem;
      padding: 0.9rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      backdrop-filter: blur(6px);
      transition: background 0.2s;
    }

    .recording-card:hover {
      background: rgba(30, 33, 46, 0.8);
    }

    .recording-info {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
      flex: 1;
      min-width: 0;
    }

    .recording-title {
      color: #ddd4b8;
      font-size: 0.9rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .recording-time {
      color: #8e95ab;
      font-size: 0.7rem;
    }

    .play-btn {
      background: rgba(200, 160, 70, 0.2);
      border: 1px solid rgba(220, 180, 80, 0.4);
      color: #e8d5a3;
      width: 2.5rem;
      height: 2.5rem;
      border-radius: 50%;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.15s;
      flex-shrink: 0;
      margin-left: 0.5rem;
    }

    .play-btn:active {
      background: rgba(210, 150, 40, 0.5);
    }

    .delete-btn {
      background: transparent;
      border: none;
      color: #6b5b5b;
      font-size: 1rem;
      cursor: pointer;
      padding: 0.3rem;
      margin-left: 0.3rem;
      border-radius: 0.5rem;
      transition: 0.15s;
      flex-shrink: 0;
    }

    .delete-btn:hover {
      color: #e08888;
      background: rgba(200, 80, 80, 0.2);
    }

    .empty-message {
      color: #5f6a82;
      text-align: center;
      padding: 1.5rem;
      font-style: italic;
    }

    @media (max-width: 450px) {
      .time-text {
        font-size: 2.8rem;
      }
      .record-btn {
        width: 4.5rem;
        height: 4.5rem;
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <div class="recorder-container">
    <div class="header-row">
      <h1>
        <span>🎙️</span> レコーダー
      </h1>
      <a href="index.html" class="home-button">
        <span>🏠</span> ホーム
      </a>
    </div>

    <!-- タイマー表示 -->
    <div class="timer-section">
      <div class="timer-display">
        <span class="time-text" id="timerDisplay">00:00</span>
      </div>
      <button class="record-btn" id="recordBtn">● REC</button>
    </div>

    <!-- 保存済み音声リスト -->
    <div class="recordings-list" id="recordingsList">
      <div class="empty-message">録音がありません</div>
    </div>
  </div>

  <script>
    (function() {
      // ----- IndexedDB 設定 -----
      const DB_NAME = 'VoiceRecorderDB';
      const DB_VERSION = 1;
      const STORE_NAME = 'recordings';
      let db = null;

      // ----- 状態 -----
      let mediaRecorder = null;
      let audioChunks = [];
      let recordingStartTime = null;
      let timerInterval = null;
      let isRecording = false;

      // ----- DOM要素 -----
      const timerDisplay = document.getElementById('timerDisplay');
      const recordBtn = document.getElementById('recordBtn');
      const recordingsList = document.getElementById('recordingsList');
      const emptyMessage = document.querySelector('.empty-message');

      // ----- IndexedDB 初期化 -----
      function openDB() {
        return new Promise((resolve, reject) => {
          const request = indexedDB.open(DB_NAME, DB_VERSION);
          request.onupgradeneeded = (event) => {
            const db = event.target.result;
            if (!db.objectStoreNames.contains(STORE_NAME)) {
              db.createObjectStore(STORE_NAME, { keyPath: 'id' });
            }
          };
          request.onsuccess = (event) => {
            db = event.target.result;
            resolve(db);
          };
          request.onerror = (event) => {
            reject(event.target.error);
          };
        });
      }

      function saveRecordingToDB(recording) {
        return new Promise((resolve, reject) => {
          const transaction = db.transaction([STORE_NAME], 'readwrite');
          const store = transaction.objectStore(STORE_NAME);
          const request = store.add(recording);
          request.onsuccess = () => resolve();
          request.onerror = () => reject(request.error);
        });
      }

      function deleteRecordingFromDB(id) {
        return new Promise((resolve, reject) => {
          const transaction = db.transaction([STORE_NAME], 'readwrite');
          const store = transaction.objectStore(STORE_NAME);
          const request = store.delete(id);
          request.onsuccess = () => resolve();
          request.onerror = () => reject(request.error);
        });
      }

      function getAllRecordingsFromDB() {
        return new Promise((resolve, reject) => {
          const transaction = db.transaction([STORE_NAME], 'readonly');
          const store = transaction.objectStore(STORE_NAME);
          const request = store.getAll();
          request.onsuccess = () => resolve(request.result);
          request.onerror = () => reject(request.error);
        });
      }

      // ----- 音声リスト表示 -----
      async function renderRecordingsList() {
        try {
          const recordings = await getAllRecordingsFromDB();
          recordingsList.innerHTML = '';
          if (recordings.length === 0) {
            recordingsList.innerHTML = '<div class="empty-message">録音がありません</div>';
            return;
          }
          recordings.sort((a, b) => b.timestamp - a.timestamp); // 新しい順
          recordings.forEach(rec => {
            const card = document.createElement('div');
            card.className = 'recording-card';
            card.dataset.id = rec.id;

            // 情報
            const infoDiv = document.createElement('div');
            infoDiv.className = 'recording-info';
            const titleSpan = document.createElement('span');
            titleSpan.className = 'recording-title';
            titleSpan.textContent = rec.title;
            const timeSpan = document.createElement('span');
            timeSpan.className = 'recording-time';
            timeSpan.textContent = rec.duration + ' · ' + new Date(rec.timestamp).toLocaleString('ja-JP');

            infoDiv.appendChild(titleSpan);
            infoDiv.appendChild(timeSpan);

            // 再生ボタン
            const playBtn = document.createElement('button');
            playBtn.className = 'play-btn';
            playBtn.innerHTML = '▶';
            playBtn.addEventListener('click', (e) => {
              e.stopPropagation();
              playAudioFromBlob(rec.audioData, playBtn);
            });

            // 削除ボタン
            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'delete-btn';
            deleteBtn.innerHTML = '🗑️';
            deleteBtn.addEventListener('click', async (e) => {
              e.stopPropagation();
              if (confirm(`「${rec.title}」を削除しますか？`)) {
                await deleteRecordingFromDB(rec.id);
                await renderRecordingsList();
              }
            });

            card.appendChild(infoDiv);
            card.appendChild(playBtn);
            card.appendChild(deleteBtn);
            recordingsList.appendChild(card);
          });
        } catch (error) {
          console.error('録音リストの読み込みエラー:', error);
        }
      }

      // ----- 音声再生 (Blob -> ObjectURL) -----
      function playAudioFromBlob(blob, buttonElement) {
        const url = URL.createObjectURL(blob);
        const audio = new Audio(url);
        const originalText = buttonElement.innerHTML;
        buttonElement.innerHTML = '⏸';
        buttonElement.disabled = true;
        audio.play();
        audio.onended = () => {
          buttonElement.innerHTML = originalText;
          buttonElement.disabled = false;
          URL.revokeObjectURL(url);
        };
        audio.onerror = () => {
          buttonElement.innerHTML = originalText;
          buttonElement.disabled = false;
          URL.revokeObjectURL(url);
        };
        // 停止ボタンとして機能させる場合の処理（簡易的に再生中のみ停止可能）
        buttonElement.onclick = (e) => {
          e.stopPropagation();
          audio.pause();
          audio.currentTime = 0;
          buttonElement.innerHTML = originalText;
          buttonElement.disabled = false;
          URL.revokeObjectURL(url);
          buttonElement.onclick = null; // リセット
        };
      }

      // ----- タイマー更新 -----
      function updateTimerDisplay(seconds) {
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        timerDisplay.textContent = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
      }

      function startTimer() {
        recordingStartTime = Date.now();
        updateTimerDisplay(0);
        timerInterval = setInterval(() => {
          const elapsed = (Date.now() - recordingStartTime) / 1000;
          updateTimerDisplay(elapsed);
        }, 200);
      }

      function stopTimer() {
        if (timerInterval) {
          clearInterval(timerInterval);
          timerInterval = null;
        }
        const elapsed = recordingStartTime ? (Date.now() - recordingStartTime) / 1000 : 0;
        updateTimerDisplay(elapsed);
        return elapsed;
      }

      // ----- 録音制御 -----
      async function startRecording() {
        if (isRecording) return;
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
          audioChunks = [];

          mediaRecorder.ondataavailable = (event) => {
            if (event.data.size > 0) {
              audioChunks.push(event.data);
            }
          };

          mediaRecorder.onstop = async () => {
            const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
            const durationSec = stopTimer();
            const now = new Date();
            const title = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}-${String(now.getMinutes()).padStart(2,'0')}-${String(now.getSeconds()).padStart(2,'0')}`;
            const durationStr = `${Math.floor(durationSec / 60)}:${String(Math.floor(durationSec % 60)).padStart(2, '0')}`;

            const recording = {
              id: Date.now().toString(),
              title: title,
              timestamp: now.getTime(),
              duration: durationStr,
              audioData: audioBlob
            };

            await saveRecordingToDB(recording);
            await renderRecordingsList();

            // ストリーム停止
            stream.getTracks().forEach(track => track.stop());
            mediaRecorder = null;
            updateUIForStop();
          };

          mediaRecorder.start();
          isRecording = true;
          startTimer();
          updateUIForRecording();
        } catch (err) {
          alert('マイクへのアクセスが許可されていないか、デバイスがサポートしていません。');
          console.error(err);
        }
      }

      function stopRecording() {
        if (mediaRecorder && mediaRecorder.state === 'recording') {
          mediaRecorder.stop();
          isRecording = false;
        }
      }

      function updateUIForRecording() {
        recordBtn.classList.add('recording');
        recordBtn.innerHTML = '■ STOP';
      }

      function updateUIForStop() {
        recordBtn.classList.remove('recording');
        recordBtn.innerHTML = '● REC';
      }

      // ----- イベントリスナー -----
      recordBtn.addEventListener('click', () => {
        if (isRecording) {
          stopRecording();
        } else {
          startRecording();
        }
      });

      // ----- 初期化 -----
      async function init() {
        try {
          await openDB();
          await renderRecordingsList();
          updateTimerDisplay(0);
        } catch (err) {
          console.error('初期化エラー:', err);
          alert('データベースの初期化に失敗しました。');
        }
      }

      init();
    })();
  </script>
</body>
</html>
