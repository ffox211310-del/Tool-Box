<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>時計 - ツールボックス</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(160deg, #1e2230 0%, #262b3a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      padding: 1.2rem;
      margin: 0;
    }

    .clock-container {
      width: 100%;
      max-width: 500px;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 2.2rem;
      padding: 2rem 1.8rem 1.8rem;
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.55), inset 0 1px 1px rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.07);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.8rem;
    }

    .header-row {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    h1 {
      font-size: 2rem;
      font-weight: 500;
      color: #ecd9b4;
      letter-spacing: 0.02em;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      text-shadow: 0 3px 8px rgba(0,0,0,0.4);
    }

    .home-button {
      background: rgba(200, 180, 130, 0.12);
      border: 1px solid rgba(220, 200, 140, 0.35);
      color: #e8d5a3;
      font-size: 0.9rem;
      font-weight: 500;
      padding: 0.55rem 1.3rem;
      border-radius: 2.5rem;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: all 0.2s ease;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.35rem;
      letter-spacing: 0.03em;
      background-color: rgba(30, 32, 44, 0.7);
    }

    .home-button:hover {
      background: rgba(220, 190, 110, 0.2);
      border-color: rgba(240, 210, 120, 0.6);
      color: #f7e6c4;
      box-shadow: 0 0 12px rgba(200, 160, 70, 0.3);
    }

    .time-display {
      background: rgba(18, 20, 28, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 2rem;
      padding: 2rem 2.5rem;
      text-align: center;
      box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
      width: 100%;
    }

    .current-time {
      font-size: 4.5rem;
      font-weight: 300;
      color: #f3e5c9;
      letter-spacing: 0.05em;
      text-shadow: 0 4px 15px rgba(0,0,0,0.6);
      line-height: 1.1;
      font-feature-settings: "tnum";
    }

    .current-date {
      font-size: 1.3rem;
      color: #b9af8c;
      margin-top: 0.5rem;
      letter-spacing: 0.04em;
      font-weight: 400;
    }

    .seconds-indicator {
      font-size: 1.8rem;
      font-weight: 300;
      color: #c0b28a;
      vertical-align: baseline;
      margin-left: 0.2rem;
    }

    @media (max-width: 480px) {
      .current-time {
        font-size: 3.2rem;
      }
      .time-display {
        padding: 1.5rem;
      }
      .clock-container {
        padding: 1.5rem 1.2rem;
      }
    }
  </style>
</head>
<body>
  <div class="clock-container">
    <div class="header-row">
      <h1>
        <span>🕒</span> 時計
      </h1>
      <a href="index.html" class="home-button">
        <span>🏠</span> ホーム
      </a>
    </div>

    <div class="time-display">
      <div class="current-time" id="timeDisplay">--:--</div>
      <div class="current-date" id="dateDisplay">----年--月--日 (---)</div>
    </div>
  </div>

  <script>
    function updateClock() {
      const now = new Date();

      // 時刻 (HH:MM)
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      const seconds = String(now.getSeconds()).padStart(2, '0');
      document.getElementById('timeDisplay').innerHTML = `${hours}:${minutes}<span class="seconds-indicator">${seconds}</span>`;

      // 日付 (日本語表記)
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const day = String(now.getDate()).padStart(2, '0');
      const dayOfWeek = ['日', '月', '火', '水', '木', '金', '土'][now.getDay()];
      document.getElementById('dateDisplay').textContent = `${year}年${month}月${day}日 (${dayOfWeek})`;
    }

    // 初回実行と1秒ごとの更新
    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
